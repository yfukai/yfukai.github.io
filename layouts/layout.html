<!doctype html>
<html>
  <head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <!-- The above 3 meta tags *must* come first in the head; any other head content must come *after* these tags -->
<!-- Use title if it's in the page YAML frontmatter -->
    <title><%= current_page.data.title || "Yohsuke T. Fukai's Webpage" %></title>

    <!-- Font awesome -->
    <script src="https://use.fontawesome.com/a3dd0953ea.js"></script>
    
    <!-- Bootstrap -->
    <%= stylesheet_link_tag "profile", "Honoka/dist/css/bootstrap.min.css" %>

    <!-- HTML5 shim and Respond.js for IE8 support of HTML5 elements and media queries -->
    <!-- WARNING: Respond.js doesn't work if you view the page via file:// -->
    <!--[if lt IE 9]>
      <script src="https://oss.maxcdn.com/html5shiv/3.7.3/html5shiv.min.js"></script>
      <script src="https://oss.maxcdn.com/respond/1.4.2/respond.min.js"></script>
    <![endif]-->
  </head>

  <body class="<%= page_classes %>">
<div class="container">
    <div class="row">
        <div class="col-lg-3 col-sm-6">
            <div class="card hovercard">
                <div class="cardheader">
                </div>
                <div class="avatar">
                    <img alt="Yohsuke T. Fukai" src="me.png">
                </div>
                <div class="info">
                    <div class="title">
                        <a href="#">$B?<0f(B $BMNM$(B<br>(Yohsuke T. Fukai)</a>
                    </div>
                    <div class="desc">Ph. D. Student</div>
                    <div class="desc">Curious developer</div>
                    <div class="desc">Tech geek</div>
                </div>
                <div class="bottom">
                    <a class="btn btn-primary btn-twitter btn-sm" href="https://twitter.com/fukai__t">
                        <i class="fa fa-twitter"></i>
                    </a>
                </div>
            </div>

        </div>
        <div class="col-lg-9 col-sm-6">
            <%= yield %>
        </div>
    </div>
</div>
    <!-- jQuery (necessary for Bootstrap's JavaScript plugins) -->
    <%= javascript_include_tag "https://ajax.googleapis.com/ajax/libs/jquery/1.12.4/jquery.min.js","chooselang"  %>
    <!-- Include all compiled plugins (below), or include individual files as needed -->
    <script src="stylesheet/Honoka/dist/js/bootstrap.min.js"></script>
    <script language="javascript">
        $(document).ready(function(){
            chooselang();
        }); 
    </script>
</body>
</html>
